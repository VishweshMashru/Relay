# Cross-compile and publish relay-edge binaries on every `edge-v*` git tag.
#
# To cut a release:
#   git tag edge-v0.1.0
#   git push origin edge-v0.1.0
#
# The workflow builds four binaries + a manifest, then publishes them as a
# GitHub Release. Customers install via install.sh / install.ps1 (also
# included as release assets).

name: release-edge

on:
  push:
    tags:
      - "edge-v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: darwin
            goarch: arm64
            ext: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Build relay-edge (${{ matrix.goos }}/${{ matrix.goarch }})
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" \
            -o "dist/relay-edge-${GOOS}-${GOARCH}${{ matrix.ext }}" \
            ./cmd/relay-edge

      - uses: actions/upload-artifact@v4
        with:
          name: relay-edge-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Copy install scripts to dist
        run: |
          cp install/install.sh dist/install.sh
          cp install/install.ps1 dist/install.ps1

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
