<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>relay viewer</title>
    <style>
      html, body { margin: 0; padding: 0; background: #000; color: #eee; font-family: system-ui, sans-serif; height: 100%; }
      .wrap { display: grid; place-items: center; height: 100vh; }
      video { max-width: 100%; max-height: 100vh; background: #000; }
      .status { position: fixed; top: 12px; left: 12px; padding: 6px 10px; background: rgba(0,0,0,0.6); border-radius: 6px; font-size: 12px; }
      .err { color: #ff8080; padding: 2rem; text-align: center; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <video id="v" controls autoplay muted playsinline></video>
      <div id="err" class="err" style="display:none"></div>
    </div>
    <div id="status" class="status">connecting…</div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <script>
      const params = new URLSearchParams(location.search);
      const sessionID = params.get("session");
      const token     = params.get("token");
      const apiBase   = params.get("api") || location.origin;
      const auth      = token ? { Authorization: `Bearer ${token}` } : {};
      const video     = document.getElementById("v");
      const status    = document.getElementById("status");
      const errBox    = document.getElementById("err");

      function fail(msg) {
        video.style.display = "none";
        status.style.display = "none";
        errBox.style.display = "";
        errBox.textContent = msg;
      }

      // WHEP playback for sub-second webrtc sessions: POST our SDP offer to
      // the play URL, apply the answer, render the incoming track.
      async function playWHEP(url) {
        const pc = new RTCPeerConnection();
        pc.addTransceiver("video", { direction: "recvonly" });
        pc.addTransceiver("audio", { direction: "recvonly" });
        pc.ontrack = (e) => {
          if (e.track.kind === "video") {
            video.srcObject = e.streams[0];
            status.textContent = "playing (webrtc)";
          }
        };
        pc.onconnectionstatechange = () => {
          if (pc.connectionState === "failed") status.textContent = "webrtc connection failed";
        };
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        // Non-trickle: wait for ICE gathering so the offer is complete.
        await new Promise((resolve) => {
          if (pc.iceGatheringState === "complete") return resolve();
          pc.addEventListener("icegatheringstatechange", () => {
            if (pc.iceGatheringState === "complete") resolve();
          });
        });
        const resp = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/sdp" },
          body: pc.localDescription.sdp,
        });
        if (!resp.ok) return fail(`WHEP negotiation failed: ${resp.status}`);
        await pc.setRemoteDescription({ type: "answer", sdp: await resp.text() });
      }

      async function load() {
        if (!sessionID) return fail("Missing ?session=<id> in URL.");
        if (!token) return fail("Missing ?token=<viewer_token> in URL.");
        const r = await fetch(`${apiBase}/v1/sessions/${sessionID}`, { headers: auth });
        if (!r.ok) return fail(`Session lookup failed: ${r.status}`);
        const data = await r.json();
        const url = data.viewer_url;
        if (!url) return fail("Session has no viewer URL yet.");
        status.textContent = "loading stream…";

        if (data.protocol === "webrtc") {
          return playWHEP(url);
        }

        if (Hls.isSupported()) {
          playHLS(url);
        } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
          video.src = url; // Safari native HLS
          video.addEventListener("playing", () => status.textContent = "playing");
        } else {
          fail("This browser doesn't support HLS.");
        }
      }

      // The stream needs time to warm up (Cloudflare can take 30-60s to
      // publish the first manifest after ingest starts) and hls.js reports
      // the interim 204/empty responses as FATAL parse/network errors, not
      // retryable load errors. So on any fatal startup error we tear the
      // player down and start over, for up to ~2 minutes.
      let attempts = 0;
      function playHLS(url) {
        const hls = new Hls({
          liveDurationInfinity: true,
          manifestLoadingMaxRetry: 6,
          manifestLoadingRetryDelay: 3000,
          levelLoadingMaxRetry: 8,
          fragLoadingMaxRetry: 8,
        });
        hls.on(Hls.Events.MANIFEST_PARSED, () => { status.textContent = "playing"; });
        hls.on(Hls.Events.ERROR, (_, data) => {
          if (!data.fatal) {
            if (data.details === "manifestLoadError") {
              status.textContent = "waiting for the stream to start…";
            }
            return;
          }
          hls.destroy();
          if (attempts++ < 40) {
            status.textContent = `waiting for the stream to start… (${attempts})`;
            setTimeout(() => playHLS(url), 3000);
          } else {
            fail(`Stream never became ready (${data.type}/${data.details}). Is the camera reachable from the edge?`);
          }
        });
        hls.loadSource(url);
        hls.attachMedia(video);
      }

      // Heartbeat every 10s so the session doesn't expire while we watch.
      // There is deliberately NO delete-on-close: refreshing the page must
      // not kill the session. When the tab goes away heartbeats stop and the
      // server reaps the session ~30s later.
      setInterval(() => {
        fetch(`${apiBase}/v1/sessions/${sessionID}/heartbeat`, { method: "POST", headers: auth }).catch(() => {});
      }, 10000);

      load().catch(err => fail(String(err)));
    </script>
  </body>
</html>
